---
name: Deploy MERN Application
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
steps:
  - name: Checkout code
    uses: actions/checkout@v3
  - name: Setup Node.js
    uses: actions/setup-node@v3
    with:
      node-version: 18.19.1
      cache: npm
      cache-dependency-path: |
        backend/package-lock.json
        frontend/package-lock.json
  - name: Install frontend dependencies
    working-directory: ./frontend
    run: npm ci
  - name: Build frontend
    working-directory: ./frontend
    run: npm run build
  - name: Deploy frontend to server
    uses: appleboy/scp-action@v0.1.5
    with: null
    host: ${{ secrets.SERVER_HOST }}
    username: ${{ secrets.SERVER_USER }}
    password: ${{ secrets.SERVER_PASSWORD }}
    port: ${{ secrets.SERVER_PORT }}
    source: frontend/src/*
    target: /var/www/html
    strip_components: 2
    rm: true
  - name: Deploy backend files
    uses: appleboy/scp-action@v0.1.5
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      password: ${{ secrets.SERVER_PASSWORD }}
      port: ${{ secrets.SERVER_PORT }}
      source: backend/*
      target: /var/big-project-server
      overwrite: true
  - name: Install dependencies and restart server
    uses: appleboy/ssh-action@v1.0.0
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      password: ${{ secrets.SERVER_PASSWORD }}
      port: ${{ secrets.SERVER_PORT }}
      script: >
        # Navigate to backend directory

        cd /var/big-project-server


        # Install dependencies

        npm ci --production


        # Ensure PM2 is installed globally

        npm list -g pm2 || npm install -g pm2


        # Reload the application with PM2 (zero-downtime reload)

        pm2 reload express-server --update-env || pm2 start server.js --name "express-server"


        # Save PM2 process list

        pm2 save


        # Optional: Clear nginx cache if needed

        nginx -s reload